<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Geist',sans-serif;background:hsl(222 47% 5%);color:hsl(210 40% 96%);padding:12px;}
  table{width:100%;border-collapse:collapse;}
  thead tr{background:rgba(244,63,94,0.05);border-bottom:1px solid rgba(255,255,255,0.10);}
  th{padding:10px 12px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:rgba(251,113,133,0.80);}
  th.num{text-align:right;}
  td{padding:10px 12px;font-size:12px;border-bottom:1px solid rgba(255,255,255,0.05);}
  tr:hover td{background:rgba(255,255,255,0.03);}
  .badge{display:inline-flex;align-items:center;gap:4px;border-radius:9999px;font-size:10px;font-weight:600;padding:2px 8px;border:1px solid;}
  .actions{display:flex;gap:4px;justify-content:center;}
  .icon-btn{background:transparent;border:none;cursor:pointer;padding:5px;border-radius:6px;color:rgba(255,255,255,0.35);display:flex;align-items:center;}
  .icon-btn:hover{color:hsl(213 94% 68%);background:rgba(59,130,246,0.10);}
  .icon-btn.del:hover{color:hsl(353 96% 80%);background:rgba(244,63,94,0.10);}
  .cat{display:flex;align-items:center;gap:6px;}
  .cat-dot{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .val{text-align:right;font-weight:600;font-variant-numeric:tabular-nums;color:hsl(353 96% 80%);}
</style>
</head>
<body>
<table>
  <thead>
    <tr>
      <th>Descrição</th><th>Data</th><th>Categoria</th><th>Pagamento</th><th>Status</th><th class="num">Valor</th><th style="text-align:center">Ações</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td style="font-weight:500">Netflix</td>
      <td style="color:rgba(255,255,255,0.45)">01/05/2025</td>
      <td><div class="cat"><div class="cat-dot" style="background:rgba(99,102,241,0.22);color:#818cf8"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg></div>Assinaturas</div></td>
      <td style="color:rgba(255,255,255,0.5);font-size:11px">Crédito</td>
      <td><span class="badge" style="background:rgba(59,130,246,0.10);border-color:rgba(96,165,250,0.40);color:hsl(213 94% 68%)">Pago</span></td>
      <td class="val">R$ 55,90</td>
      <td><div class="actions"><button class="icon-btn"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="icon-btn del"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6m4-6v6"/></svg></button></div></td>
    </tr>
    <tr>
      <td style="font-weight:500">Supermercado</td>
      <td style="color:rgba(255,255,255,0.45)">03/05/2025</td>
      <td><div class="cat"><div class="cat-dot" style="background:rgba(251,146,60,0.22);color:#fb923c"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg></div>Alimentação</div></td>
      <td style="color:rgba(255,255,255,0.5);font-size:11px">Pix</td>
      <td><span class="badge" style="background:rgba(245,158,11,0.10);border-color:rgba(251,191,36,0.40);color:hsl(43 96% 76%)">Pendente</span></td>
      <td class="val">R$ 312,40</td>
      <td><div class="actions"><button class="icon-btn"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="icon-btn del"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6m4-6v6"/></svg></button></div></td>
    </tr>
    <tr>
      <td style="font-weight:500">iPhone 15 Pro</td>
      <td style="color:rgba(255,255,255,0.45)">10/04/2025</td>
      <td><div class="cat"><div class="cat-dot" style="background:rgba(59,130,246,0.22);color:#60a5fa"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>Tecnologia</div></td>
      <td style="color:rgba(255,255,255,0.5);font-size:11px"><div style="display:flex;flex-direction:column;gap:2px">Crédito a Prazo<span style="display:inline-flex;align-items:center;gap:2px;background:rgba(251,146,60,0.15);border:1px solid rgba(251,146,60,0.30);border-radius:9999px;padding:1px 6px;font-size:9px;color:hsl(27 96% 66%)"><b>3</b><span style="opacity:0.5">/</span>12</span></div></td>
      <td><span class="badge" style="background:rgba(244,63,94,0.10);border-color:rgba(251,113,133,0.40);color:hsl(353 96% 80%)">Cancelado</span></td>
      <td class="val">R$ 599,92</td>
      <td><div class="actions"><button class="icon-btn"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="icon-btn del"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6m4-6v6"/></svg></button></div></td>
    </tr>
  </tbody>
</table>
</body>
</html>
