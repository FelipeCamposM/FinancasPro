<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Geist', sans-serif;
    background: hsl(222 47% 5%);
    color: hsl(210 40% 96%);
    padding: 24px;
    display: flex;
    align-items: flex-start;
    gap: 32px;
  }

  /* ── Sidebar shell ── */
  .sidebar {
    width: 228px;
    background: hsl(222 45% 8%);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 48px rgba(2,6,23,0.55);
  }

  /* ── Header ── */
  .sidebar-header {
    padding: 18px 16px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    gap: 11px;
  }
  .logo-mark {
    width: 34px; height: 34px;
    background: hsl(217 91% 60%);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(37,99,235,0.35);
  }
  .app-name { font-size: 14px; font-weight: 700; line-height: 1.2; letter-spacing: -0.01em; }
  .app-sub  { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 1px; }

  /* ── Nav section ── */
  .nav-section { padding: 10px 10px 6px; }
  .nav-label {
    font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.14em;
    color: rgba(255,255,255,0.25);
    padding: 6px 8px 8px;
    display: block;
  }

  /* ── Nav item ── */
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 9px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: rgba(255,255,255,0.55);
    position: relative;
    transition: all 150ms;
    margin-bottom: 1px;
  }
  .nav-item:hover {
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.85);
  }
  .nav-item.active {
    background: rgba(59,130,246,0.14);
    color: hsl(213 94% 68%);
  }
  .nav-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    width: 3px; height: 18px;
    background: hsl(217 91% 60%);
    border-radius: 0 3px 3px 0;
  }
  .nav-icon {
    width: 16px; height: 16px;
    flex-shrink: 0;
    opacity: 0.8;
  }
  .nav-item.active .nav-icon { opacity: 1; }

  /* ── User section ── */
  .sidebar-user {
    margin-top: auto;
    padding: 12px 14px;
    border-top: 1px solid rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    border-radius: 0 0 16px 16px;
    transition: background 150ms;
  }
  .sidebar-user:hover { background: rgba(255,255,255,0.04); }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: hsl(217 91% 60%);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(37,99,235,0.30);
  }
  .user-name  { font-size: 12px; font-weight: 600; line-height: 1.3; }
  .user-email { font-size: 10px; color: rgba(255,255,255,0.35); }
  .chevron { margin-left: auto; opacity: 0.3; }

  /* ── Collapsed sidebar ── */
  .sidebar-collapsed {
    width: 60px;
    background: hsl(222 45% 8%);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    box-shadow: 0 20px 48px rgba(2,6,23,0.55);
    padding: 14px 0;
    gap: 6px;
  }
  .nav-icon-only {
    width: 36px; height: 36px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: rgba(255,255,255,0.40);
    transition: all 150ms;
  }
  .nav-icon-only:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.85); }
  .nav-icon-only.active { background: rgba(59,130,246,0.14); color: hsl(213 94% 68%); }

  .caption {
    font-size: 9px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; color: rgba(255,255,255,0.25);
    text-align: center; margin-top: 8px;
  }
</style>
</head>
<body>

<!-- ── Expanded sidebar ── -->
<div class="sidebar">
  <div class="sidebar-header">
    <div class="logo-mark">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
    </div>
    <div>
      <div class="app-name">FinançasPro</div>

  </div>

  <div class="nav-section">

      Dashboard
    </div>

    <div class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg>
      Gastos
    </div>

    <div class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
      Renda
    </div>

    <div class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      Cartões
    </div>

    <div class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      Assinaturas
    </div>
  </div>

  <div class="sidebar-user">
    <div class="avatar">FM</div>
    <div>
      <div class="user-name">Felipe M.</div>
      <div class="user-email">felipe@email.com</div>
    </div>
    <div class="chevron">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
  </div>
</div>

<!-- ── Collapsed sidebar ── -->
<div>
  <div class="caption" style="margin-bottom:10px">Collapsed</div>
  <div class="sidebar-collapsed">
    <div class="logo-mark" style="margin-bottom:6px">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
    </div>

    <div class="nav-icon-only active">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    </div>
    <div class="nav-icon-only">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg>
    </div>
    <div class="nav-icon-only">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
    </div>
    <div class="nav-icon-only">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
    </div>
    <div class="nav-icon-only">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
    </div>

    <div style="margin-top:auto;padding-top:10px;border-top:1px solid rgba(255,255,255,0.07);width:100%;display:flex;justify-content:center">
      <div class="avatar" style="width:28px;height:28px;font-size:10px">FM</div>
    </div>
  </div>
</div>

</body>
</html>
