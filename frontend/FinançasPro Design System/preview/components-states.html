<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Geist',sans-serif;background:hsl(222 47% 5%);color:hsl(210 40% 96%);padding:16px;}
  .states{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .state-card{border:1px solid;border-radius:12px;padding:18px 16px;display:flex;align-items:center;gap:14px;}
  .icon-wrap{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .state-text{display:flex;flex-direction:column;gap:2px;}
  .state-title{font-size:13px;font-weight:600;}
  .state-desc{font-size:11px;opacity:0.5;}
  .skeleton{background:linear-gradient(90deg,rgba(255,255,255,0.06) 25%,rgba(255,255,255,0.12) 50%,rgba(255,255,255,0.06) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px;}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>
<div class="states">
  <!-- Loading -->
  <div class="state-card" style="background:rgba(59,130,246,0.05);border-color:rgba(96,165,250,0.15)">
    <div class="skeleton" style="width:38px;height:38px;border-radius:10px;flex-shrink:0"></div>
    <div style="flex:1;display:flex;flex-direction:column;gap:6px">
      <div class="skeleton" style="height:11px;width:70%"></div>
      <div class="skeleton" style="height:9px;width:50%"></div>
    </div>
  </div>
  <!-- Empty -->
  <div class="state-card" style="background:rgba(255,255,255,0.03);border-color:rgba(255,255,255,0.08)">
    <div class="icon-wrap" style="background:rgba(255,255,255,0.06)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2"><path d="M3 7h18l-1.5 9H4.5L3 7z"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    </div>
    <div class="state-text">
      <div class="state-title" style="color:rgba(255,255,255,0.55)">Nenhum registro</div>
      <div class="state-desc">Cadastre um item para começar.</div>
    </div>
  </div>
  <!-- Error -->
  <div class="state-card" style="background:rgba(244,63,94,0.08);border-color:rgba(251,113,133,0.20)">
    <div class="icon-wrap" style="background:rgba(244,63,94,0.15)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="hsl(353 96% 80%)" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </div>
    <div class="state-text">
      <div class="state-title" style="color:hsl(353 96% 80%)">Erro ao carregar</div>
      <div class="state-desc">Verifique sua conexão e tente novamente.</div>
    </div>
  </div>
  <!-- Success toast -->
  <div class="state-card" style="background:rgba(34,197,94,0.08);border-color:rgba(34,197,94,0.20)">
    <div class="icon-wrap" style="background:rgba(34,197,94,0.15)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="hsl(142 71% 65%)" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    </div>
    <div class="state-text">
      <div class="state-title" style="color:hsl(142 71% 65%)">Salvo com sucesso</div>
      <div class="state-desc">Gasto cadastrado com sucesso.</div>
    </div>
  </div>
</div>
</body>
</html>
