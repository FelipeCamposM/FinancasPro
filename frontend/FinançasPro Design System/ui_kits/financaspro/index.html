<script>
// Subtle animated background — slow drifting orbs
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');

  // Orb definitions — positions as fractions of canvas size
  const orbs = [
    { xf: 0.15, yf: 0.20, r: 0.42, hue: 217, speed: 0.00018, phase: 0.0,  opacity: 0.22 },
    { xf: 0.82, yf: 0.12, r: 0.30, hue: 258, speed: 0.00013, phase: 1.8,  opacity: 0.18 },
    { xf: 0.65, yf: 0.78, r: 0.34, hue: 200, speed: 0.00015, phase: 3.5,  opacity: 0.16 },
    { xf: 0.08, yf: 0.82, r: 0.24, hue: 230, speed: 0.00020, phase: 5.1,  opacity: 0.14 },
    { xf: 0.52, yf: 0.48, r: 0.20, hue: 217, speed: 0.00012, phase: 2.4,  opacity: 0.10 },
  ];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  let t = 0;
  function draw() {
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    // Base dark background
    ctx.fillStyle = '#070d1c';
    ctx.fillRect(0, 0, W, H);

    orbs.forEach(o => {
      // Gentle drift — each orb moves in a slow Lissajous path
      const drift = 0.055; // fraction of canvas
      const cx = (o.xf + Math.sin(t * o.speed * 1.3 + o.phase) * drift) * W;
      const cy = (o.yf + Math.cos(t * o.speed + o.phase + 1) * drift) * H;
      const radius = o.r * Math.min(W, H);

      // Slow breathe in opacity
      const breathe = 1 + 0.18 * Math.sin(t * o.speed * 2.5 + o.phase);
      const alpha = o.opacity * breathe;

      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
      grad.addColorStop(0,   `hsla(${o.hue},75%,62%,${alpha})`);
      grad.addColorStop(0.5, `hsla(${o.hue},70%,50%,${alpha * 0.4})`);
      grad.addColorStop(1,   `hsla(${o.hue},65%,40%,0)`);

      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    });

    // Subtle vignette to keep edges dark
    const vignette = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.9);
    vignette.addColorStop(0, 'rgba(0,0,0,0)');
    vignette.addColorStop(1, 'rgba(3,6,20,0.65)');
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, W, H);

    t++;
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

function Sparkline({data, color, h=72}) {
  if (!data||data.length<2) return null;
  const max=Math.max(...data), min=Math.min(...data)*0.85;
  const W=240;
  const pts = data.map((v,i) => {
    const x = (i/(data.length-1))*W;
    const y = h - ((v-min)/(max-min||1)) * h * 0.82 - h*0.06;
    return [x,y];
  });
  const line = pts.map((p,i)=>`${i===0?'M':'L'}${p[0]},${p[1]}`).join(' ');
  const area = `${line} L${W},${h} L0,${h} Z`;
  const id = `g${color.replace(/[^a-z0-9]/gi,'')}`;
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${h}`} preserveAspectRatio="none" style={{display:'block'}}>
      <defs>
        <linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.28"/>
          <stop offset="100%" stopColor={color} stopOpacity="0.02"/>
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#${id})`}/>
      <path d={line} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map(([x,y],i) => i===pts.length-1 && (
        <circle key={i} cx={x} cy={y} r="3.5" fill={color} stroke="rgba(0,0,0,0.5)" strokeWidth="1.5"/>
      ))}
    </svg>
  );
}

                  </td>

                  <td style={{padding:'10px 14px',textAlign:'right',fontWeight:600,fontVariantNumeric:'tabular-nums',fontSize:12,color:T.rose4}}>{brl(g.val)}</td>
                  <td style={{padding:'10px 14px'}}>
                    <div style={{display:'flex',justifyContent:'center',gap:3}}>
                      {[[I.Pencil,'rgba(59,130,246,0.12)',T.blue4],[I.Trash,'rgba(244,63,94,0.12)',T.rose4]].map(([Ic,hbg,hc],j)=>(
                        <button key={j} style={{width:27,height:27,borderRadius:6,border:'none',cursor:'pointer',background:'transparent',color:'rgba(255,255,255,0.25)',display:'flex',alignItems:'center',justifyContent:'center',transition:'all 130ms'}}
                          onMouseEnter={e=>{e.currentTarget.style.background=hbg;e.currentTarget.style.color=hc;}}
                          onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color='rgba(255,255,255,0.25)';}}>
                          <Ic s={12}/>
                        </button>
                      ))}
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function Cartoes() {
  const LOGOS = {
    visa:'../../assets/brand_cardlogos/visa.svg',
    mastercard:'../../assets/brand_cardlogos/mastercard.svg',
    elo:'../../assets/brand_cardlogos/elo.svg',
  };
  function contrast(hex) {
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return (0.299*r+0.587*g+0.114*b)>140?'#1a1a1a':'#ffffff';
  }
  const ativos = CARTOES.filter(c=>c.ativo).length;
  const limiteTotal = CARTOES.reduce((a,c)=>a+c.limite,0);
  return (
    <div style={{display:'flex',flexDirection:'column',gap:18}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:700,letterSpacing:'-0.01em'}}>Cartões</h1>
          <p style={{fontSize:12,color:T.fgMuted,marginTop:2}}>{CARTOES.length} cartões cadastrados</p>
        </div>
        <Btn variant="blue_soft"><I.Plus s={13}/> Novo Cartão</Btn>
      </div>

      <div className="anim d1" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
        {[
          {l:'Ativos',             v:ativos,           c:T.blue4,   bg:'rgba(59,130,246,0.10)',  bd:'rgba(96,165,250,0.22)'},
          {l:'Inativos',           v:CARTOES.length-ativos, c:'rgba(255,255,255,0.70)', bg:T.bgCard,  bd:T.border},
          {l:'Limite consolidado', v:brl(limiteTotal), c:T.violet4, bg:'rgba(139,92,246,0.10)', bd:'rgba(167,139,250,0.22)'},
        ].map(c=>(
          <div key={c.l} style={{background:c.bg,border:`1px solid ${c.bd}`,borderRadius:12,padding:'14px 16px'}}>
            <p style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.11em',color:T.fgDim}}>{c.l}</p>
            <p style={{fontSize:22,fontWeight:700,color:c.c,marginTop:5,fontVariantNumeric:'tabular-nums'}}>{c.v}</p>
          </div>
        ))}
      </div>

      <div className="anim d2" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
        {CARTOES.map(c=>{
          const tc = contrast(c.cor);
          const isLight = tc==='#1a1a1a';
          const logo = LOGOS[c.bandeira];
          return (
            <div key={c.id} style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:16,padding:14,display:'flex',flexDirection:'column',gap:12}}>
              {/* Card face */}
              <div style={{position:'relative',height:148,background:c.cor,borderRadius:12,padding:'14px 16px',color:tc,boxShadow:'0 8px 24px rgba(2,6,23,0.45)',transition:'transform 180ms',cursor:'default'}}
                onMouseEnter={e=>e.currentTarget.style.transform='translateY(-3px)'}
                onMouseLeave={e=>e.currentTarget.style.transform='none'}>
                <div style={{position:'absolute',top:14,right:14,opacity:0.55}}>
                  <I.Wifi s={14} c={tc}/>
                </div>
                <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.15em',opacity:0.65}}>{c.banco}</div>
                <div style={{fontSize:11,fontWeight:600,marginTop:2}}>{c.apelido}</div>
                <div style={{display:'flex',alignItems:'center',gap:10,marginTop:16}}>
                  {logo
                    ? <img src={logo} alt={c.bandeira} style={{height:20,width:'auto',maxWidth:48,objectFit:'contain',filter:isLight?'none':'brightness(0) invert(1)',opacity:0.85}}/>
                    : <div style={{height:20,width:34,borderRadius:4,background:isLight?'rgba(0,0,0,0.15)':'rgba(255,255,255,0.25)'}}/>
                  }
                  <span style={{fontFamily:'monospace',fontSize:12,letterSpacing:'0.15em'}}>•••• {c.num}</span>
                </div>
                <div style={{position:'absolute',bottom:12,left:16,right:16,display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}>
                  <div>
                    <div style={{fontSize:8,textTransform:'uppercase',letterSpacing:'0.1em',opacity:0.5}}>Titular</div>
                    <div style={{fontSize:10,fontWeight:600,textTransform:'uppercase'}}>{c.nome}</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:8,textTransform:'uppercase',letterSpacing:'0.1em',opacity:0.5}}>{c.tipo}</div>
                    <div style={{fontSize:10,fontWeight:600,textTransform:'capitalize'}}>{c.bandeira}</div>
                  </div>
                </div>
                {!c.ativo && (
                  <div style={{position:'absolute',inset:0,borderRadius:12,background:'rgba(0,0,0,0.50)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <Badge color="slate">Inativo</Badge>
                  </div>
                )}
              </div>
              {/* Info */}
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div>
                  <p style={{fontSize:11,color:T.fgMuted}}>Limite: <b style={{color:'rgba(255,255,255,0.78)',fontVariantNumeric:'tabular-nums'}}>{brl(c.limite)}</b></p>
                  {c.fecha && <p style={{fontSize:10,color:T.fgDim,marginTop:1}}>Fecha {c.fecha} · Vence {c.vence}</p>}
                </div>
                <div style={{display:'flex',gap:3}}>
                  {[[I.Pencil,'rgba(59,130,246,0.12)',T.blue4],[I.Trash,'rgba(244,63,94,0.12)',T.rose4]].map(([Ic,hbg,hc],j)=>(
                    <button key={j} style={{width:27,height:27,borderRadius:6,border:'none',cursor:'pointer',background:'transparent',color:'rgba(255,255,255,0.25)',display:'flex',alignItems:'center',justifyContent:'center',transition:'all 130ms'}}
                      onMouseEnter={e=>{e.currentTarget.style.background=hbg;e.currentTarget.style.color=hc;}}
                      onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color='rgba(255,255,255,0.25)';}}>
                      <Ic s={12}/>
                    </button>
                  ))}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Assinaturas() {
  const [showInactive, setShowInactive] = useState(false);
  const list = ASSINATURAS.filter(a=>showInactive?!a.ativa:a.ativa);
  const ativas = ASSINATURAS.filter(a=>a.ativa);
  const totalMes = ativas.reduce((a,s)=>a+s.val,0);
  return (
    <div style={{display:'flex',flexDirection:'column',gap:18}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:700,letterSpacing:'-0.01em'}}>Assinaturas</h1>
          <p style={{fontSize:12,color:T.fgMuted,marginTop:2}}>Cobranças recorrentes mensais</p>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
          <div style={{border:'1px solid rgba(167,139,250,0.28)',background:'rgba(139,92,246,0.10)',borderRadius:9,padding:'6px 14px',textAlign:'right'}}>
            <p style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',color:'rgba(196,181,253,0.65)'}}>Total mensal</p>
            <p style={{fontSize:16,fontWeight:700,color:T.violet4,fontVariantNumeric:'tabular-nums'}}>{brl(totalMes)}</p>
          </div>
          <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:12,color:T.fgMuted}}>
            <div onClick={()=>setShowInactive(v=>!v)} style={{width:34,height:19,borderRadius:9999,background:showInactive?T.blue:'rgba(255,255,255,0.14)',transition:'background 200ms',position:'relative',cursor:'pointer',flexShrink:0}}>
              <div style={{position:'absolute',top:2,left:showInactive?17:2,width:15,height:15,borderRadius:'50%',background:'#fff',transition:'left 200ms',boxShadow:'0 1px 3px rgba(0,0,0,0.30)'}}/>
            </div>
            Inativas
          </label>
          <Btn variant="violet"><I.Plus s={13}/> Nova</Btn>
        </div>
      </div>

      <div className="anim d1" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
        {[
          {l:'Ativas',             v:ativas.length,    c:T.violet4, bg:'rgba(139,92,246,0.10)', bd:'rgba(167,139,250,0.22)'},
          {l:'Inativas',           v:ASSINATURAS.length-ativas.length, c:'rgba(255,255,255,0.65)', bg:T.bgCard, bd:T.border},
          {l:'Custo anual estimado',v:brl(totalMes*12),c:T.blue4, bg:'rgba(59,130,246,0.10)', bd:'rgba(96,165,250,0.22)'},
        ].map(c=>(
          <div key={c.l} style={{background:c.bg,border:`1px solid ${c.bd}`,borderRadius:12,padding:'14px 16px'}}>
            <p style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.11em',color:T.fgDim}}>{c.l}</p>
            <p style={{fontSize:22,fontWeight:700,color:c.c,marginTop:5,fontVariantNumeric:'tabular-nums'}}>{c.v}</p>
          </div>
        ))}
      </div>

      <div className="anim d2" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
        {list.map(a=>(
          <div key={a.id} style={{
            border:a.ativa?'1px solid rgba(167,139,250,0.22)':'1px solid rgba(255,255,255,0.07)',
            background:a.ativa?'rgba(139,92,246,0.08)':T.bgCard,
            borderRadius:14, padding:18, opacity:a.ativa?1:0.6,
            position:'relative', transition:'all 180ms',
          }}>
            <div style={{position:'absolute',top:14,right:14}}>
              <Badge color={a.ativa?'violet':'slate'}>{a.ativa?'✓ Ativa':'✗ Inativa'}</Badge>
            </div>
            <div style={{paddingRight:72,marginBottom:10}}>
              <p style={{fontSize:14,fontWeight:600}}>{a.desc}</p>
              <p style={{fontFamily:'BebasNeue,sans-serif',fontSize:28,letterSpacing:'0.02em',color:T.violet4,marginTop:4,fontVariantNumeric:'tabular-nums'}}>
                {brl(a.val)}<span style={{fontSize:11,color:T.fgDim,fontFamily:'Geist,sans-serif',letterSpacing:'normal',fontWeight:400,marginLeft:3}}>/mês</span>
              </p>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:4,fontSize:11,color:T.fgMuted,marginBottom:14}}>
              <span>Todo dia <b style={{color:'rgba(255,255,255,0.75)'}}>{a.dia}</b> · {a.forma}</span>
              <span style={{color:T.fgDim}}>{a.cat}</span>
            </div>
            <div style={{borderTop:`1px solid rgba(255,255,255,0.07)`,paddingTop:10,display:'flex',gap:6}}>
              <button style={{flex:1,height:28,fontSize:11,fontFamily:'inherit',fontWeight:500,borderRadius:7,border:'none',cursor:'pointer',background:'rgba(139,92,246,0.12)',color:T.violet4,transition:'background 140ms'}}
                onMouseEnter={e=>e.currentTarget.style.background='rgba(139,92,246,0.22)'}
                onMouseLeave={e=>e.currentTarget.style.background='rgba(139,92,246,0.12)'}>
                Editar
              </button>
              {a.ativa
                ? <button style={{flex:1,height:28,fontSize:11,fontFamily:'inherit',fontWeight:500,borderRadius:7,border:'none',cursor:'pointer',background:'rgba(244,63,94,0.10)',color:T.rose3,transition:'background 140ms'}}
                    onMouseEnter={e=>e.currentTarget.style.background='rgba(244,63,94,0.20)'}
                    onMouseLeave={e=>e.currentTarget.style.background='rgba(244,63,94,0.10)'}>
                    Cancelar
                  </button>
                : <button style={{flex:1,height:28,fontSize:11,fontFamily:'inherit',fontWeight:500,borderRadius:7,border:'none',cursor:'pointer',background:'rgba(59,130,246,0.10)',color:T.blue3,transition:'background 140ms'}}
                    onMouseEnter={e=>e.currentTarget.style.background='rgba(59,130,246,0.20)'}
                    onMouseLeave={e=>e.currentTarget.style.background='rgba(59,130,246,0.10)'}>
                    Reativar
                  </button>
              }
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function Renda() {
  const tipoC = {Salário:'blue',Freelance:'violet',Investimento:'green'};
  return (
    <div style={{display:'flex',flexDirection:'column',gap:18}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:700,color:T.blue4,letterSpacing:'-0.01em'}}>Renda</h1>
          <p style={{fontSize:12,color:T.fgMuted,marginTop:2}}>{RENDAS.length} lançamentos em maio</p>
        </div>
        <Btn variant="blue_soft"><I.Plus s={13}/> Nova Renda</Btn>
      </div>
      <div className="anim d1" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
        {[
          {l:'Total Renda',     v:brl(8400), c:T.green5,  bg:'rgba(34,197,94,0.10)',  bd:'rgba(74,222,128,0.22)'},
          {l:'Lançamentos',     v:RENDAS.length,c:'rgba(255,255,255,0.80)',bg:T.bgCard,bd:T.border},
          {l:'Recorrentes',     v:RENDAS.filter(r=>r.rec).length, c:T.violet4, bg:'rgba(139,92,246,0.10)', bd:'rgba(167,139,250,0.22)'},
        ].map(c=>(
          <div key={c.l} style={{background:c.bg,border:`1px solid ${c.bd}`,borderRadius:12,padding:'14px 16px'}}>
            <p style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.11em',color:T.fgDim}}>{c.l}</p>
            <p style={{fontSize:22,fontWeight:700,color:c.c,marginTop:5,fontVariantNumeric:'tabular-nums'}}>{c.v}</p>
          </div>
        ))}
      </div>
      <div className="anim d2" style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:13,overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{borderBottom:`1px solid ${T.border}`,background:'rgba(59,130,246,0.04)'}}>
              {['Descrição','Tipo','Recorrente','Data','Valor',''].map((h,i)=>(
                <th key={h+i} style={{padding:'9px 14px',textAlign:i===4?'right':i===5?'center':'left',fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.09em',color:'rgba(96,165,250,0.70)'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {RENDAS.map(r=>(
              <tr key={r.id} style={{borderBottom:`1px solid rgba(255,255,255,0.04)`}}
                onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.02)'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <td style={{padding:'10px 14px',fontWeight:500,fontSize:12}}>{r.desc}</td>
                <td style={{padding:'10px 14px'}}><Badge color={tipoC[r.tipo]||'slate'}>{r.tipo}</Badge></td>
                <td style={{padding:'10px 14px'}}><Badge color={r.rec?'violet':'slate'}>{r.rec?'Sim':'Não'}</Badge></td>
                <td style={{padding:'10px 14px',fontSize:11,color:T.fgMuted}}>{r.data}</td>
                <td style={{padding:'10px 14px',textAlign:'right',fontWeight:600,fontVariantNumeric:'tabular-nums',fontSize:12,color:T.green5}}>{brl(r.val)}</td>
                <td style={{padding:'10px 14px'}}>
                  <div style={{display:'flex',justifyContent:'center',gap:3}}>
                    {[[I.Pencil,'rgba(59,130,246,0.12)',T.blue4],[I.Trash,'rgba(244,63,94,0.12)',T.rose4]].map(([Ic,hbg,hc],j)=>(
                      <button key={j} style={{width:27,height:27,borderRadius:6,border:'none',cursor:'pointer',background:'transparent',color:'rgba(255,255,255,0.25)',display:'flex',alignItems:'center',justifyContent:'center',transition:'all 130ms'}}
                        onMouseEnter={e=>{e.currentTarget.style.background=hbg;e.currentTarget.style.color=hc;}}
                        onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color='rgba(255,255,255,0.25)';}}>
                        <Ic s={12}/>
                      </button>
                    ))}
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ─── App ─────────────────────────────────────────────────── */
const SCREENS = {dashboard:Dashboard, gastos:Gastos, renda:Renda, cartoes:Cartoes, assinaturas:Assinaturas};

function App() {
  const [route, setRoute] = useState('dashboard');
  const Screen = SCREENS[route]||Dashboard;
  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden',fontFamily:"'Geist',sans-serif"}}>
      <Sidebar active={route} onNav={r=>{setRoute(r);}} />
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',background:T.bgEl,backdropFilter:'blur(2px)',WebkitBackdropFilter:'blur(2px)'}}>
        <Topbar/>
        <main key={route} style={{flex:1,overflowY:'auto',padding:'26px 30px'}}>
          <Screen/>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
