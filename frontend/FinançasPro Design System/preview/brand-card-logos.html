<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Geist',sans-serif;background:hsl(222 47% 5%);color:hsl(210 40% 96%);padding:20px;}
  .row{display:flex;gap:16px;flex-wrap:wrap;align-items:center;}
  .logo-item{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .logo-box{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.10);border-radius:10px;width:56px;height:40px;display:flex;align-items:center;justify-content:center;padding:6px;}
  .logo-box img{max-width:100%;max-height:100%;object-fit:contain;}
  .name{font-size:9px;font-weight:600;opacity:0.4;letter-spacing:0.05em;}
  .label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;opacity:0.4;margin-bottom:8px;}
</style>
</head>
<body>
<div class="label">Card Brand Logos</div>
<div class="row">
  <div class="logo-item"><div class="logo-box"><img src="assets/brand_cardlogos/visa.svg" alt="Visa" style="filter:brightness(0) invert(1)"/></div><div class="name">Visa</div></div>
  <div class="logo-item"><div class="logo-box"><img src="assets/brand_cardlogos/mastercard.svg" alt="Mastercard"/></div><div class="name">Mastercard</div></div>
  <div class="logo-item"><div class="logo-box"><img src="assets/brand_cardlogos/elo.svg" alt="Elo"/></div><div class="name">Elo</div></div>
  <div class="logo-item"><div class="logo-box"><img src="assets/brand_cardlogos/amex.svg" alt="Amex"/></div><div class="name">Amex</div></div>
  <div class="logo-item"><div class="logo-box"><img src="assets/brand_cardlogos/hipercard.svg" alt="Hipercard"/></div><div class="name">Hipercard</div></div>
  <div class="logo-item"><div class="logo-box"><img src="assets/brand_cardlogos/alelo.svg" alt="Alelo"/></div><div class="name">Alelo</div></div>
  <div class="logo-item"><div class="logo-box"><img src="assets/brand_cardlogos/paypal.svg" alt="PayPal"/></div><div class="name">PayPal</div></div>
</div>
<div style="margin-top:16px">
<div class="label">Brand Logos (Subscription examples)</div>
<div class="row">
  <div class="logo-item"><div class="logo-box" style="width:56px;height:40px;background:#24292e"><img src="assets/brand_logos/github.svg" alt="GitHub" style="filter:brightness(0) invert(1)"/></div><div class="name">GitHub</div></div>
  <div class="logo-item"><div class="logo-box" style="width:56px;height:40px;background:#e50914"><img src="assets/brand_logos/netflix.svg" alt="Netflix" style="filter:brightness(0) invert(1)"/></div><div class="name">Netflix</div></div>
</div>
</div>
</body>
</html>
